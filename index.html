<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>LA MESA · Temporada 1</title>
  <meta name="description" content="Una serie sobre un grupo que no sabía que era una serie." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="devBadge" class="dev-badge hidden">MODO DEV</div>

  <nav class="topnav" id="topnav">
    <span class="nav-logo">LA MESA</span>
    <span class="nav-badge">T1</span>
  </nav>

  <main id="home" class="home">
    <header class="billboard">
      <div class="bb-art" aria-hidden="true">
        <svg viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="spot" cx="50%" cy="18%" r="80%">
              <stop offset="0%" stop-color="#2a3f52"/>
              <stop offset="45%" stop-color="#131c24"/>
              <stop offset="100%" stop-color="#0a0a0a"/>
            </radialGradient>
            <linearGradient id="tbl" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#1d4a38"/>
              <stop offset="100%" stop-color="#0f2a20"/>
            </linearGradient>
          </defs>
          <rect width="800" height="450" fill="url(#spot)"/>
          <polygon points="400,40 640,450 160,450" fill="#ffffff06"/>
          <polygon points="250,290 550,290 640,410 160,410" fill="url(#tbl)" stroke="#e8e6e12a" stroke-width="2"/>
          <line x1="400" y1="290" x2="400" y2="410" stroke="#e8e6e12a" stroke-width="2" stroke-dasharray="8 8"/>
          <rect x="392" y="268" width="16" height="30" rx="3" fill="#e8e6e130"/>
          <circle cx="470" cy="250" r="9" fill="#ffe9c9" opacity=".95"/>
          <circle cx="470" cy="250" r="18" fill="#ffe9c9" opacity=".12"/>
          <circle cx="330" cy="180" r="2" fill="#fff" opacity=".5"/>
          <circle cx="530" cy="120" r="1.6" fill="#fff" opacity=".4"/>
          <circle cx="600" cy="210" r="1.6" fill="#fff" opacity=".3"/>
          <circle cx="220" cy="120" r="1.4" fill="#fff" opacity=".35"/>
        </svg>
      </div>
      <div class="bb-grad"></div>
      <div class="bb-content">
        <p class="bb-tag" id="bbTag"></p>
        <h1 class="bb-title">LA&nbsp;MESA</h1>
        <p class="bb-meta" id="bbMeta"></p>
        <p class="bb-syn" id="bbSyn"></p>
        <div class="bb-actions">
          <button id="bbPlay" class="bb-play">▶&nbsp;&nbsp;Reproducir</button>
          <span class="bb-progress" id="progressBadge"></span>
        </div>
      </div>
    </header>

    <h2 class="row-title">Episodios</h2>
    <section class="episodes" id="episodeList" aria-label="Episodios"></section>

    <section class="shelf hidden" id="shelf" aria-label="Tarjetas de la temporada">
      <h2 class="row-title">Tarjetas de la temporada</h2>
      <p class="shelf-sub">Cada episodio deja una. Colecciónalas.</p>
      <div class="shelf-cards" id="shelfCards"></div>
    </section>

    <footer class="foot">
      <p>LA MESA · una producción independiente · Lima</p>
    </footer>
  </main>

  <!-- Reproductor de episodios -->
  <div id="player" class="player hidden" role="dialog" aria-modal="true">
    <button id="closePlayer" class="player-close" aria-label="Volver">✕</button>
    <div id="playerContent" class="player-content"></div>
  </div>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
